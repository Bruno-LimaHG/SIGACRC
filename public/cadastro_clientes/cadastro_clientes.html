<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGACRC - Cadastro do Cliente</title>
    <link rel="stylesheet" href="../assets/css/sigacrc.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <aside class="auth-image">
                <div>
                    <h2>Cadastro seguro</h2>
                    <p>Crie seu acesso para enviar o formulário e acompanhar o protocolo.</p>
                </div>
            </aside>

            <div class="auth-content">
                <span class="tag">Novo cliente</span>
                <h1>Criar cadastro</h1>
                <p>Preencha os dados principais para simular o acesso ao SIGACRC.</p>

                <form id="formCadastroCliente" class="form-grid">
                    <div class="campo campo-grande">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" autocomplete="name">
                    </div>

                    <div class="campo campo-grande">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seuemail@exemplo.com" autocomplete="email">
                    </div>

                    <div class="campo">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                    </div>

                    <div class="campo">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Mínimo 4 caracteres" autocomplete="new-password">
                    </div>

                    <div class="form-acoes campo-grande">
                        <button type="submit">Cadastrar</button>
                        <a class="btn btn-secundario" href="../login_clientes/login_clientes.html">Já tenho conta</a>
                    </div>
                </form>
                <div id="mensagemCadastro" class="mensagem oculto"></div>

                <div class="form-acoes">
                    <a href="../tela_inicial/tela_inicial.html">Voltar para início</a>
                </div>
            </div>
        </section>
    </main>

    <script src="../assets/js/sigacrc-storage.js?v=5"></script>
    <script src="cadastro_clientes.js?v=2"></script>
</body>
</html>
