<!-- Bloco com os dados das duas testemunhas -->
<h2>Testemunhas</h2>
<p class="descricao">Informe os dados das duas testemunhas maiores de 18 anos.</p>

<!-- Dados da primeira testemunha -->
<h3>Testemunha 1</h3>

<div class="grid">
    <div class="campo campo-grande">
        <label for="testemunha1_nome">Nome completo</label>
        <input type="text" id="testemunha1_nome" name="testemunha1_nome">
    </div>

    <div class="campo">
        <label for="testemunha1_nacionalidade">Nacionalidade</label>
        <input type="text" id="testemunha1_nacionalidade" name="testemunha1_nacionalidade" list="listaNacionalidades">
    </div>

    <div class="campo">
        <label for="testemunha1_estado_civil">Estado civil</label>
        <input type="text" id="testemunha1_estado_civil" name="testemunha1_estado_civil">
    </div>

    <div class="campo">
        <label for="testemunha1_profissao">Profissão</label>
        <input type="text" id="testemunha1_profissao" name="testemunha1_profissao">
    </div>

    <div class="campo">
        <label for="testemunha1_idade">Idade</label>
        <input type="number" id="testemunha1_idade" name="testemunha1_idade">
    </div>

    <div class="campo">
        <label for="testemunha1_rg">RG</label>
        <input type="text" id="testemunha1_rg" name="testemunha1_rg" class="rg" maxlength="12">
    </div>

    <div class="campo campo-grande">
        <label for="cep_testemunha1">CEP</label>
        <input type="text" id="cep_testemunha1" name="cep_testemunha1" class="cep" maxlength="9">
    </div>

    <div class="campo campo-grande">
        <label for="logradouro_testemunha1">Logradouro</label>
        <input type="text" id="logradouro_testemunha1" name="logradouro_testemunha1">
    </div>

    <div class="campo">
        <label for="numero_testemunha1">Número</label>
        <input type="text" id="numero_testemunha1" name="numero_testemunha1">
    </div>

    <div class="campo">
        <label for="bairro_testemunha1">Bairro</label>
        <input type="text" id="bairro_testemunha1" name="bairro_testemunha1">
    </div>

    <div class="campo">
        <label for="cidade_testemunha1">Cidade</label>
        <input type="text" id="cidade_testemunha1" name="cidade_testemunha1">
    </div>

    <div class="campo">
        <label for="uf_testemunha1">UF</label>
        <input type="text" id="uf_testemunha1" name="uf_testemunha1" list="listaEstados" maxlength="2">
    </div>
</div>
