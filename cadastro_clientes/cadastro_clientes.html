<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="cadastro_clientes.css">
</head>
<body>

  <div class="container">
    
    <!-- Imagem lateral -->
    <div class="image"></div>

    <!-- Caixa de cadastro -->
    <div class="login-box">
      <h2>Cadastro</h2>

      <div class="input-group">
        <input type="text" id="nome" placeholder="Nome completo">
        <span>👤</span>
      </div>

      <div class="input-group">
        <input type="text" id="email" placeholder="Email">
        <span>📧</span>
      </div>

      <div class="input-group">
        <input type="text" id="cpf" placeholder="CPF">
        <span>🪪</span>
      </div>

      <div class="input-group">
        <input type="password" id="senha" placeholder="Senha">
        <span>🔒</span>
      </div>

      <button class="login-btn" onclick="cadastrar()">Cadastrar</button>

      <div class="funcionario-link">
        <a href="../login_clientes/login_clientes.html">Já tenho conta</a>
      </div>
    </div>

  </div>

  <script src="cadastro_clientes.js"></script>
</body>
</html>
