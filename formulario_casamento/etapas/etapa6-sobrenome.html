<!-- Bloco para informar alteração de sobrenome -->
<h2>Alteração de sobrenome</h2>
<p class="descricao">Informe se haverá alteração de sobrenome após o casamento.</p>

<!-- Campos com o nome completo após o casamento -->
<div class="grid">
    <div class="campo campo-grande">
        <label for="sobrenome_contraente1">Alteração de sobrenome do 1º contraente</label>
        <input type="text" id="sobrenome_contraente1" name="sobrenome_contraente1" placeholder="Digite como ficará o nome completo ou deixe em branco">
    </div>

    <div class="campo campo-grande">
        <label for="sobrenome_contraente2">Alteração de sobrenome do 2º contraente</label>
        <input type="text" id="sobrenome_contraente2" name="sobrenome_contraente2" placeholder="Digite como ficará o nome completo ou deixe em branco">
    </div>
</div>

<div class="aviso">
    Caso não exista alteração, deixe os campos em branco.
</div>
