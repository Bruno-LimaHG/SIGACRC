<!-- Bloco com os dados dos pais do segundo contraente -->
<h2>Pais do 2º Contraente</h2>
<p class="descricao">Dados do pai e da mãe.</p>

<!-- Dados do pai do segundo contraente -->
<h3>Dados do pai</h3>

<div class="grid">
    <div class="campo campo-grande">
        <label for="pai_nome2">Nome completo</label>
        <input type="text" id="pai_nome2" name="pai_nome2">
    </div>

    <div class="campo">
        <label for="pai_falecido2">Falecido?</label>
        <select id="pai_falecido2" name="pai_falecido2" data-falecido="pai_falecido_box2">
            <option value="">Selecione</option>
            <option>Não</option>
            <option>Sim</option>
        </select>
    </div>

    <div id="pai_falecido_box2" class="campo oculto">
        <label for="pai_data_falecimento2">Data de falecimento</label>
        <input type="date" id="pai_data_falecimento2" name="pai_data_falecimento2">
    </div>

    <div class="campo">
        <label for="pai_naturalidade2">Naturalidade</label>
        <input type="text" id="pai_naturalidade2" name="pai_naturalidade2">
    </div>

    <div class="campo">
        <label for="pai_estado_civil2">Estado civil</label>
        <input type="text" id="pai_estado_civil2" name="pai_estado_civil2">
    </div>

    <div class="campo">
        <label for="pai_profissao2">Profissão</label>
        <input type="text" id="pai_profissao2" name="pai_profissao2">
    </div>

    <div class="campo">
        <label for="pai_idade2">Idade</label>
        <input type="number" id="pai_idade2" name="pai_idade2">
    </div>

    <div class="campo campo-grande">
        <label for="pai_endereco2">Endereço</label>
        <input type="text" id="pai_endereco2" name="pai_endereco2">
    </div>
</div>
