<!-- Bloco com os dados das duas testemunhas -->
<h2>Testemunhas</h2>
<p class="descricao">Informe os dados das duas testemunhas maiores de 18 anos.</p>

<!-- Dados da primeira testemunha -->
<h3>Testemunha 1</h3>

<div class="grid">
    <div class="campo campo-grande">
        <label for="testemunha1_nome">Nome completo</label>
        <input type="text" id="testemunha1_nome" name="testemunha1_nome">
    </div>

    <div class="campo">
        <label for="testemunha1_nacionalidade">Nacionalidade</label>
        <input type="text" id="testemunha1_nacionalidade" name="testemunha1_nacionalidade">
    </div>

    <div class="campo">
        <label for="testemunha1_estado_civil">Estado civil</label>
        <input type="text" id="testemunha1_estado_civil" name="testemunha1_estado_civil">
    </div>

    <div class="campo">
        <label for="testemunha1_profissao">Profissão</label>
        <input type="text" id="testemunha1_profissao" name="testemunha1_profissao">
    </div>

    <div class="campo">
        <label for="testemunha1_idade">Idade</label>
        <input type="number" id="testemunha1_idade" name="testemunha1_idade">
    </div>

    <div class="campo">
        <label for="testemunha1_rg">RG</label>
        <input type="text" id="testemunha1_rg" name="testemunha1_rg" class="rg" maxlength="12">
    </div>

    <div class="campo campo-grande">
        <label for="testemunha1_rua">Rua</label>
        <input type="text" id="testemunha1_rua" name="testemunha1_rua">
    </div>

    <div class="campo">
        <label for="testemunha1_numero">Número</label>
        <input type="text" id="testemunha1_numero" name="testemunha1_numero">
    </div>

    <div class="campo">
        <label for="testemunha1_bairro">Bairro</label>
        <input type="text" id="testemunha1_bairro" name="testemunha1_bairro">
    </div>

    <div class="campo">
        <label for="testemunha1_cidade">Cidade</label>
        <input type="text" id="testemunha1_cidade" name="testemunha1_cidade">
    </div>

    <div class="campo">
        <label for="testemunha1_uf">UF</label>
        <input type="text" id="testemunha1_uf" name="testemunha1_uf" maxlength="2">
    </div>
</div>
