<!-- Bloco com os dados dos pais do primeiro contraente -->
<h2>Pais do 1º Contraente</h2>
<p class="descricao">Dados do pai e da mãe.</p>

<!-- Dados do pai do primeiro contraente -->
<h3>Dados do pai</h3>

<div class="grid">
    <div class="campo campo-grande">
        <label for="pai_nome1">Nome completo</label>
        <input type="text" id="pai_nome1" name="pai_nome1">
    </div>

    <div class="campo">
        <label for="pai_falecido1">Falecido?</label>
        <select id="pai_falecido1" name="pai_falecido1" data-falecido="pai_falecido_box1">
            <option value="">Selecione</option>
            <option>Não</option>
            <option>Sim</option>
        </select>
    </div>

    <div id="pai_falecido_box1" class="campo oculto">
        <label for="pai_data_falecimento1">Data de falecimento</label>
        <input type="date" id="pai_data_falecimento1" name="pai_data_falecimento1">
    </div>

    <div class="campo">
        <label for="pai_naturalidade1">Naturalidade</label>
        <input type="text" id="pai_naturalidade1" name="pai_naturalidade1">
    </div>

    <div class="campo">
        <label for="pai_estado_civil1">Estado civil</label>
        <input type="text" id="pai_estado_civil1" name="pai_estado_civil1">
    </div>

    <div class="campo">
        <label for="pai_profissao1">Profissão</label>
        <input type="text" id="pai_profissao1" name="pai_profissao1">
    </div>

    <div class="campo">
        <label for="pai_idade1">Idade</label>
        <input type="number" id="pai_idade1" name="pai_idade1">
    </div>

    <div class="campo campo-grande">
        <label for="pai_endereco1">Endereço</label>
        <input type="text" id="pai_endereco1" name="pai_endereco1">
    </div>
</div>
