<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGACRC - Login do Funcionário</title>
    <link rel="stylesheet" href="../assets/css/sigacrc.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <aside class="auth-image">
                <div>
                    <h2>Acesso restrito</h2>
                    <p>Área destinada aos escreventes para análise e acompanhamento dos pedidos.</p>
                </div>
            </aside>

            <div class="auth-content">
                <span class="tag">Funcionários</span>
                <h1>Escolha a forma de login</h1>
                <p>Para o MVP, os métodos abaixo simulam autenticação institucional.</p>

                <div class="lista-cards" style="margin-top: 22px;">
                    <button type="button" class="btnMetodoLogin btn-secundario" data-metodo="Identificação do Registro Civil">
                        <img src="../imagens/idrc.png" alt="IdRC" style="width: 54px;"> Entrar com identificação do Registro Civil
                    </button>

                    <button type="button" class="btnMetodoLogin" data-metodo="Certificado Digital ICP-Brasil">
                        <img src="../imagens/icp.png" alt="ICP Brasil" style="width: 54px;"> Entrar com Certificado Digital ICP-Brasil
                    </button>

                    <button type="button" class="btnMetodoLogin btn-secundario" data-metodo="Gov.br institucional">
                        <img src="../imagens/govbr.png" alt="Gov.br" style="width: 54px;"> Entrar com Gov.br
                    </button>
                </div>

                <div id="mensagemFuncionario" class="mensagem oculto"></div>

                <div class="form-acoes">
                    <a href="../tela_inicial/tela_inicial.html">Voltar para início</a>
                    <a href="../login_clientes/login_clientes.html">Sou cliente</a>
                </div>
            </div>
        </section>
    </main>

    <script src="../assets/js/sigacrc-storage.js"></script>
    <script src="login_escreventes.js"></script>
</body>
</html>
