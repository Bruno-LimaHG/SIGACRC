<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="login_escreventes.css">
</head>
<body>

    <!-- IMAGEM DE FUNDO (troque o nome depois) -->
    <div class="background"></div>

    <div class="login-box">

        <h1>Bem Vindo!</h1>
        <p>Escolha a forma de login</p>

        <!-- Botão 1 -->
        <button class="login-btn">
            <img src="..//imagens/idrc.png" alt="IdRC">
            <span>Entrar com identificação do Registro Civil</span>
        </button>

        <!-- Botão 2 -->
        <button class="login-btn" id="btnToken">
            <img src="../imagens/icp.png" alt="ICP Brasil">
            <span>Entrar com Certificado Digital ICP-Brasil</span>
        </button>

        <!-- Botão 3 -->
        <button class="login-btn">
            <img src="../imagens/govbr.png" alt="Gov.br">
            <span>Entrar com Gov.br</span>
        </button>

        <button class="back-btn" id="btnVoltar">
            Voltar para a página inicial
        </button>

        <div class="cliente-link">
            <a href="#" id="linkCliente">Sou cliente</a>
        </div>

    </div>

<script src="login_escreventes.js"></script>

</body>
</html>
