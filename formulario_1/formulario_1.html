<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário de Casamento - Etapa 1</title>
<link rel="stylesheet" href="formulario_1.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>Formulário de Casamento</h1>
        <p>Preencha as informações abaixo - Etapa 1</p>

        <form>

            <h3>Dados do Casamento</h3>

            <div class="linha">
                <div class="campo">
                    <label>Data provável do casamento</label>
                    <input type="date" name="data_casamento">
                </div>

                <div class="campo">
                    <label>Local da cerimônia</label>
                    <select name="local_cerimonia">
                        <option value="">Selecione</option>
                        <option>Cartório</option>
                        <option>Diligência</option>
                        <option>Religioso com efeito civil</option>
                    </select>
                </div>
            </div>

            <h3>1º Contraente</h3>

            <div class="linha">
                <div class="campo">
                    <label>Nome completo</label>
                    <input type="text" name="nome_contraente1">
                </div>

                <div class="campo">
                    <label>Data de nascimento</label>
                    <input type="date" name="nascimento_contraente1" id="dataNascimento">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Estado civil</label>
                    <select name="estado_civil_contraente1">
                        <option value="">Selecione</option>
                        <option>Solteiro(a)</option>
                        <option>Divorciado(a)</option>
                        <option>Viúvo(a)</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Profissão</label>
                    <input type="text" name="profissao_contraente1">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>CPF</label>
                    <input type="text" name="cpf_contraente1">
                </div>

                <div class="campo">
                    <label>RG</label>
                    <input type="text" name="rg_contraente1">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Email</label>
                    <input type="email" name="email_contraente1">
                </div>

                <div class="campo">
                    <label>Celular</label>
                    <input type="tel" name="celular_contraente1">
                </div>
            </div>

            <h3>Endereço</h3>

            <div class="linha">
                <div class="campo">
                    <label>Logradouro (Rua, Avenida, etc.)</label>
                    <input type="text" name="logradouro_contraente1">
                </div>

                <div class="campo">
                    <label>Número</label>
                    <input type="text" name="numero_contraente1">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Complemento</label>
                    <input type="text" name="complemento_contraente1">
                </div>

                <div class="campo">
                    <label>Bairro</label>
                    <input type="text" name="bairro_contraente1">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Cidade</label>
                    <input type="text" name="cidade_contraente1">
                </div>

                <div class="campo">
                    <label>CEP</label>
                    <input type="text" name="cep_contraente1">
                </div>
            </div>

            <button type="button" id="proximo">Próximo</button>

        </form>

    </div>

</div>

<script src="formulario_1.js"></script>

</body>
</html>
