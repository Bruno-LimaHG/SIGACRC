<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Casamento - Etapa 2</title>
    <link rel="stylesheet" href="formulario_2.css">
</head>
<body>

<div class="container">

    <div class="form-box">

        <h1>Formulário de Casamento</h1>
        <p>Preencha as informações abaixo - Etapa 2</p>

        <form>

            <h3>2º Contraente</h3>

            <div class="linha">
                <div class="campo">
                    <label>Nome completo</label>
                    <input type="text" name="nome_contraente2">
                </div>

                <div class="campo">
                    <label>Data de nascimento</label>
                    <input type="date" name="nascimento_contraente2" id="dataNascimento2">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Estado civil</label>
                    <select name="estado_civil_contraente2">
                        <option value="">Selecione</option>
                        <option>Solteiro(a)</option>
                        <option>Divorciado(a)</option>
                        <option>Viúvo(a)</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Profissão</label>
                    <input type="text" name="profissao_contraente2">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>CPF</label>
                    <input type="text" name="cpf_contraente2">
                </div>

                <div class="campo">
                    <label>RG</label>
                    <input type="text" name="rg_contraente2">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Email</label>
                    <input type="email" name="email_contraente2">
                </div>

                <div class="campo">
                    <label>Celular</label>
                    <input type="tel" name="celular_contraente2">
                </div>
            </div>

            <h3>Endereço do 2º Contraente</h3>

            <div class="linha">
                <div class="campo">
                    <label>Logradouro (Rua, Avenida, etc.)</label>
                    <input type="text" name="logradouro_contraente2">
                </div>

                <div class="campo">
                    <label>Número</label>
                    <input type="text" name="numero_contraente2">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Complemento</label>
                    <input type="text" name="complemento_contraente2">
                </div>

                <div class="campo">
                    <label>Bairro</label>
                    <input type="text" name="bairro_contraente2">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Cidade</label>
                    <input type="text" name="cidade_contraente2">
                </div>

                <div class="campo">
                    <label>CEP</label>
                    <input type="text" name="cep_contraente2">
                </div>
            </div>

            <div class="botoes">
                <button type="button" id="voltar">Voltar</button>
                <button type="button" id="proximo">Próximo</button>
            </div>

        </form>

    </div>

</div>

<script src="formulario_2.js"></script>

</body>
</html>
